<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetVida - Cuidados Inteligentes</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            orange: '#FF6B35',
                            cream: '#FFF8F0',
                            brown: '#2D1B0E',
                        }
                    },
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6B35">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="PetVida">
    
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        body {
            background-color: #FFF8F0;
            color: #2D1B0E;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React and Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;
        
        // --- Icons ---
        const LucideIcon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name, size, className]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- Constants ---
        const SPECIES_EMOJI = { dog: '🐕', cat: '🐱', bird: '🐦', other: '🐾' };
        const SPECIES_COLORS = { dog: 'bg-orange-500', cat: 'bg-purple-500', bird: 'bg-blue-500', other: 'bg-emerald-500' };

        // --- Gemini Service ---
        const GEMINI_API_KEY = "SUA_CHAVE_AQUI"; 

        const callGemini = async (prompt, model = "gemini-1.5-flash") => {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                console.error("Gemini Error:", error);
                return null;
            }
        };

        // --- Main App ---
        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('home');
            const [pets, setPets] = useState([]);
            const [selectedPetIndex, setSelectedPetIndex] = useState(0);
            const [events, setEvents] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [aiResponse, setAiResponse] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [notificationPermission, setNotificationPermission] = useState('default');

            useEffect(() => {
                const savedUser = localStorage.getItem('petvida_user');
                if (savedUser) setUser(JSON.parse(savedUser));
                const savedPets = localStorage.getItem('petvida_pets');
                if (savedPets) setPets(JSON.parse(savedPets));
                const savedEvents = localStorage.getItem('petvida_events');
                if (savedEvents) setEvents(JSON.parse(savedEvents));
                if ('Notification' in window) setNotificationPermission(Notification.permission);
            }, []);

            useEffect(() => {
                if (user) localStorage.setItem('petvida_user', JSON.stringify(user));
                localStorage.setItem('petvida_pets', JSON.stringify(pets));
                localStorage.setItem('petvida_events', JSON.stringify(events));
            }, [user, pets, events]);

            const currentPet = pets[selectedPetIndex];

            const handleLogin = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const email = formData.get('email');
                setUser({ id: Date.now().toString(), name: email.split('@')[0], email });
            };

            const handleAddPet = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newPet = {
                    id: Date.now().toString(),
                    name: formData.get('name'),
                    species: formData.get('species'),
                    breed: formData.get('breed'),
                    weight: formData.get('weight'),
                    age: formData.get('age'),
                    healthRecords: [],
                    vaccines: []
                };
                setPets([...pets, newPet]);
                setIsModalOpen(false);
            };

            const handleAddEvent = (e) => {
                e.preventDefault();
                if (!currentPet) return;
                const formData = new FormData(e.target);
                const newEvent = {
                    id: Date.now().toString(),
                    petId: currentPet.id,
                    type: formData.get('type'),
                    description: formData.get('description'),
                    date: formData.get('date'),
                    time: formData.get('time'),
                };
                setEvents([...events, newEvent]);
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-brand-cream">
                        <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="w-full max-w-md p-8 glass-card rounded-[40px] text-center shadow-2xl">
                            <div className="text-7xl mb-4">🐾</div>
                            <h1 className="text-4xl font-black text-brand-orange mb-2">PetVida</h1>
                            <p className="text-gray-500 mb-8 font-bold">Cuidados inteligentes para seu pet</p>
                            <form onSubmit={handleLogin} className="space-y-4 text-left">
                                <input name="email" type="email" placeholder="Seu e-mail" className="w-full p-5 rounded-3xl border-2 border-orange-100 focus:border-brand-orange outline-none transition-all" required />
                                <input type="password" placeholder="Sua senha" className="w-full p-5 rounded-3xl border-2 border-orange-100 focus:border-brand-orange outline-none transition-all" required />
                                <button className="w-full bg-brand-orange text-white font-black py-5 rounded-3xl shadow-xl shadow-orange-200 hover:scale-[1.02] active:scale-95 transition-all">
                                    Entrar ou Criar Conta
                                </button>
                            </form>
                        </motion.div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto min-h-screen pb-24">
                    <header className="bg-brand-orange p-5 flex justify-between items-center text-white shadow-xl sticky top-0 z-50 rounded-b-[30px]">
                        <div className="flex items-center gap-2 font-black text-2xl">
                            <LucideIcon name="paw-print" size={28} />
                            <span>PetVida</span>
                        </div>
                        <div className="flex gap-2">
                            <button className="p-2 bg-white/20 rounded-2xl">
                                <LucideIcon name="bell" size={20} />
                            </button>
                            <button onClick={() => setUser(null)} className="p-2 bg-white/20 rounded-2xl">
                                <LucideIcon name="log-out" size={20} />
                            </button>
                        </div>
                    </header>

                    <main className="p-5 space-y-8">
                        {activeTab === 'home' && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="space-y-6">
                                <div className="flex justify-between items-center">
                                    <div>
                                        <h2 className="text-3xl font-black">Meus Pets</h2>
                                        <p className="text-gray-500 font-bold">Gerencie seus companheiros</p>
                                    </div>
                                    <button onClick={() => setIsModalOpen(true)} className="bg-brand-orange text-white w-14 h-14 rounded-3xl shadow-lg text-2xl font-bold flex items-center justify-center">
                                        <LucideIcon name="plus" size={28} />
                                    </button>
                                </div>
                                <div className="space-y-4">
                                    {pets.length === 0 ? (
                                        <div className="text-center py-16 text-gray-300">
                                            <div className="text-6xl mb-4 opacity-20"><LucideIcon name="paw-print" size={64} className="mx-auto" /></div>
                                            <p className="font-black">Nenhum pet cadastrado ainda</p>
                                        </div>
                                    ) : pets.map((pet, i) => (
                                        <div key={pet.id} onClick={() => setSelectedPetIndex(i)} className={`p-5 rounded-[35px] glass-card border-4 transition-all cursor-pointer flex items-center gap-4 ${selectedPetIndex === i ? 'border-brand-orange shadow-xl' : 'border-transparent opacity-70'}`}>
                                            <div className={`w-16 h-16 rounded-2xl flex items-center justify-center text-3xl ${SPECIES_COLORS[pet.species]}`}>
                                                {SPECIES_EMOJI[pet.species]}
                                            </div>
                                            <div className="flex-1">
                                                <p className="font-black text-xl">{pet.name}</p>
                                                <p className="text-sm text-gray-500 font-bold">{pet.breed} • {pet.age}</p>
                                            </div>
                                            <LucideIcon name="chevron-right" className="text-gray-300" />
                                        </div>
                                    ))}
                                </div>
                            </motion.div>
                        )}
                        
                        {activeTab === 'health' && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="space-y-6">
                                <h2 className="text-3xl font-black">Saúde</h2>
                                <div className="p-8 rounded-[40px] bg-gradient-to-br from-indigo-600 to-purple-600 text-white shadow-2xl relative overflow-hidden">
                                    <div className="relative z-10">
                                        <h3 className="text-2xl font-black mb-2 flex items-center gap-2">
                                            <LucideIcon name="sparkles" size={24} />
                                            <span>Análise IA</span>
                                        </h3>
                                        <p className="text-indigo-100 mb-6 font-bold">A IA analisa o perfil do {currentPet?.name || 'seu pet'} e dá recomendações.</p>
                                        <button className="w-full bg-white text-indigo-600 font-black py-4 rounded-3xl shadow-lg">Analisar Saúde</button>
                                    </div>
                                    <div className="absolute -right-8 -bottom-8 text-white/10 rotate-12">
                                        <LucideIcon name="heart-pulse" size={160} />
                                    </div>
                                </div>
                            </motion.div>
                        )}

                        {activeTab === 'agenda' && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="space-y-6">
                                <h2 className="text-3xl font-black">Agenda</h2>
                                <div className="p-6 glass-card rounded-[35px]">
                                    <div className="flex items-center gap-2 font-black text-blue-600 mb-6">
                                        <LucideIcon name="calendar-days" size={24} />
                                        <span>Próximos Eventos</span>
                                    </div>
                                    <div className="space-y-4 mb-8">
                                        {events.filter(e => e.petId === currentPet?.id).map(event => (
                                            <div key={event.id} className="flex items-center gap-4 p-4 bg-blue-50 rounded-3xl">
                                                <div className="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center">
                                                    <LucideIcon name="calendar-days" size={24} />
                                                </div>
                                                <div>
                                                    <p className="font-black text-blue-900">{event.description}</p>
                                                    <p className="text-xs text-blue-500 font-bold">{event.date} às {event.time}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <form onSubmit={handleAddEvent} className="space-y-4 p-4 bg-white rounded-[30px] border-2 border-blue-50">
                                        <p className="text-xs font-black text-blue-600 uppercase ml-2">Novo Compromisso</p>
                                        <select name="type" className="w-full p-4 bg-blue-50 rounded-2xl outline-none font-bold text-sm">
                                            <option value="Banho">Banho</option>
                                            <option value="Veterinário">Veterinário</option>
                                            <option value="Vacina">Vacina</option>
                                        </select>
                                        <input name="description" placeholder="Descrição" className="w-full p-4 bg-blue-50 rounded-2xl outline-none text-sm" required />
                                        <div className="grid grid-cols-2 gap-2">
                                            <input name="date" type="date" className="w-full p-4 bg-blue-50 rounded-2xl outline-none text-sm" required />
                                            <input name="time" type="time" className="w-full p-4 bg-blue-50 rounded-2xl outline-none text-sm" required />
                                        </div>
                                        <button type="submit" className="w-full bg-blue-600 text-white font-black py-4 rounded-2xl">Agendar</button>
                                    </form>
                                </div>
                            </motion.div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-gray-100 p-4 flex justify-around shadow-2xl z-50 rounded-t-[40px]">
                        <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center gap-1 ${activeTab === 'home' ? 'text-brand-orange' : 'text-gray-300'}`}>
                            <LucideIcon name="paw-print" size={26} />
                            <span className="text-[10px] font-black uppercase">Início</span>
                        </button>
                        <button onClick={() => setActiveTab('health')} className={`flex flex-col items-center gap-1 ${activeTab === 'health' ? 'text-brand-orange' : 'text-gray-300'}`}>
                            <LucideIcon name="heart-pulse" size={26} />
                            <span className="text-[10px] font-black uppercase">Saúde</span>
                        </button>
                        <button onClick={() => setActiveTab('agenda')} className={`flex flex-col items-center gap-1 ${activeTab === 'agenda' ? 'text-brand-orange' : 'text-gray-300'}`}>
                            <LucideIcon name="calendar-days" size={26} />
                            <span className="text-[10px] font-black uppercase">Agenda</span>
                        </button>
                    </nav>

                    <AnimatePresence>
                        {isModalOpen && (
                            <div className="fixed inset-0 flex items-center justify-center p-6 z-[100]">
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} onClick={() => setIsModalOpen(false)} className="absolute inset-0 bg-black/40 backdrop-blur-sm" />
                                <motion.div initial={{ scale: 0.9, y: 20 }} animate={{ scale: 1, y: 0 }} exit={{ scale: 0.9, y: 20 }} className="relative w-full max-w-sm bg-white rounded-[50px] p-8 shadow-2xl">
                                    <h3 className="text-3xl font-black mb-6">Novo Pet</h3>
                                    <form onSubmit={handleAddPet} className="space-y-4">
                                        <input name="name" placeholder="Nome do Pet" className="w-full p-5 bg-gray-50 rounded-3xl outline-none" required />
                                        <select name="species" className="w-full p-5 bg-gray-50 rounded-3xl outline-none font-bold text-sm">
                                            <option value="dog">Cachorro</option>
                                            <option value="cat">Gato</option>
                                            <option value="bird">Pássaro</option>
                                            <option value="other">Outro</option>
                                        </select>
                                        <input name="breed" placeholder="Raça" className="w-full p-5 bg-gray-50 rounded-3xl outline-none text-sm" />
                                        <input name="age" placeholder="Idade" className="w-full p-5 bg-gray-50 rounded-3xl outline-none text-sm" />
                                        <button type="submit" className="w-full bg-brand-orange text-white font-black py-5 rounded-3xl shadow-xl">Salvar Pet</button>
                                    </form>
                                </motion.div>
                            </div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
