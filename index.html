<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#F97316" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>PetVida - Cuidados Inteligentes</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #FFF8F0 0%, #FFEDD5 100%);
      min-height: 100vh;
    }
    .pet-card {
      transition: all 0.3s ease;
    }
    .pet-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    .fade-in {
      animation: fadeIn 0.3s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .pulse-dot {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

/* ================= COMPONENTES ================= */

const Card = ({ children, className = "" }) => (
  <div className={`bg-white rounded-2xl shadow-lg p-5 ${className}`}>
    {children}
  </div>
);

const Button = ({ children, onClick, type = "button", variant = "primary", className = "", disabled = false }) => {
  const variants = {
    primary: "bg-orange-500 hover:bg-orange-600 text-white",
    secondary: "bg-gray-200 hover:bg-gray-300 text-gray-800",
    danger: "bg-red-500 hover:bg-red-600 text-white",
    success: "bg-green-500 hover:bg-green-600 text-white",
    info: "bg-blue-500 hover:bg-blue-600 text-white"
  };
  return (
    <button
      type={type}
      onClick={onClick}
      disabled={disabled}
      className={`w-full py-3 px-4 rounded-xl font-bold transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed ${variants[variant]} ${className}`}
    >
      {children}
    </button>
  );
};

const Input = ({ label, type = "text", name, placeholder, required = false, defaultValue = "" }) => (
  <div>
    {label && <label className="block text-sm font-semibold text-gray-700 mb-1">{label}</label>}
    <input
      type={type}
      name={name}
      placeholder={placeholder}
      required={required}
      defaultValue={defaultValue}
      className="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-orange-500 focus:outline-none transition-colors"
    />
  </div>
);

const Modal = ({ isOpen, onClose, title, children }) => {
  if (!isOpen) return null;
  return (
    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl p-6 w-full max-w-md max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
        <div className="flex justify-between items-center mb-4">
          <h3 className="text-xl font-bold text-gray-800">{title}</h3>
          <button onClick={onClose} className="text-gray-500 hover:text-gray-700 text-2xl">×</button>
        </div>
        {children}
      </div>
    </div>
  );
};

/* ================= APP PRINCIPAL ================= */

function App() {
  /* ================= STATE ================= */
  const [user, setUser] = useState(null);
  const [pets, setPets] = useState([]);
  const [events, setEvents] = useState([]);
  const [selectedPetId, setSelectedPetId] = useState(null);
  const [notifiedEvents, setNotifiedEvents] = useState([]);
  const [showAddPet, setShowAddPet] = useState(false);
  const [showAddEvent, setShowAddEvent] = useState(false);
  const [showAddHealth, setShowAddHealth] = useState(false);
  const [activeTab, setActiveTab] = useState('pets');

  /* ================= LOAD STORAGE ================= */
  useEffect(() => {
    try {
      const savedUser = localStorage.getItem("petvida_user");
      const savedPets = localStorage.getItem("petvida_pets");
      const savedEvents = localStorage.getItem("petvida_events");
      const savedNotified = localStorage.getItem("petvida_notified");

      if (savedUser) setUser(JSON.parse(savedUser));
      if (savedPets) setPets(JSON.parse(savedPets));
      if (savedEvents) setEvents(JSON.parse(savedEvents));
      if (savedNotified) setNotifiedEvents(JSON.parse(savedNotified));
    } catch (e) {
      console.error("Erro ao carregar dados:", e);
    }
  }, []);

  /* ================= SAVE STORAGE ================= */
  useEffect(() => {
    try {
      if (user) localStorage.setItem("petvida_user", JSON.stringify(user));
      localStorage.setItem("petvida_pets", JSON.stringify(pets));
      localStorage.setItem("petvida_events", JSON.stringify(events));
      localStorage.setItem("petvida_notified", JSON.stringify(notifiedEvents));
    } catch (e) {
      console.error("Erro ao salvar dados:", e);
    }
  }, [user, pets, events, notifiedEvents]);

  /* ================= NOTIFICATIONS ================= */
  useEffect(() => {
    if (!("Notification" in window)) return;

    const checkNotifications = () => {
      const today = new Date().toISOString().split("T")[0];
      const now = new Date();
      const currentTime = now.toTimeString().slice(0, 5);

      events.forEach(event => {
        if (
          event.date === today &&
          event.time === currentTime &&
          Notification.permission === "granted" &&
          !notifiedEvents.includes(event.id)
        ) {
          new Notification("🐾 Lembrete PetVida", {
            body: `${event.description} às ${event.time}`,
            icon: "/icon-192.png"
          });
          setNotifiedEvents(prev => [...prev, event.id]);
        }
      });
    };

    const interval = setInterval(checkNotifications, 30000);
    checkNotifications();

    return () => clearInterval(interval);
  }, [events, notifiedEvents]);

  const currentPet = pets.find(p => p.id === selectedPetId);

  /* ================= AUTH ================= */
  const handleRegister = (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const newUser = {
      id: Date.now(),
      name: form.get("name"),
      email: form.get("email"),
      password: form.get("password")
    };
    setUser(newUser);
    setShowAddPet(true);
  };

  const handleLogin = (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const savedUser = JSON.parse(localStorage.getItem("petvida_user"));
    
    if (savedUser && 
        savedUser.email === form.get("email") && 
        savedUser.password === form.get("password")) {
      setUser(savedUser);
    } else {
      alert("E-mail ou senha incorretos!");
    }
  };

  const logout = () => {
    if (confirm("Deseja realmente sair?")) {
      setUser(null);
      setSelectedPetId(null);
    }
  };

  const enableNotifications = async () => {
    if ("Notification" in window) {
      const permission = await Notification.requestPermission();
      if (permission === "granted") {
        new Notification("✅ Notificações ativadas!", {
          body: "Você receberá lembretes dos cuidados do seu pet"
        });
      }
    }
  };

  /* ================= PET ================= */
  const addPet = (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const newPet = {
      id: Date.now(),
      name: form.get("name"),
      species: form.get("species"),
      breed: form.get("breed"),
      age: form.get("age"),
      weight: form.get("weight"),
      healthRecords: [],
      avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${Date.now()}`
    };
    setPets([...pets, newPet]);
    setSelectedPetId(newPet.id);
    setShowAddPet(false);
    e.target.reset();
  };

  const deletePet = (petId) => {
    if (confirm("Tem certeza? Isso apagará todos os registros deste pet.")) {
      setPets(pets.filter(p => p.id !== petId));
      setEvents(events.filter(e => e.petId !== petId));
      if (selectedPetId === petId) setSelectedPetId(null);
    }
  };

  /* ================= HEALTH ================= */
  const addHealthRecord = (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const updatedPets = pets.map(pet => {
      if (pet.id === selectedPetId) {
        return {
          ...pet,
          healthRecords: [...pet.healthRecords, {
            id: Date.now(),
            description: form.get("description"),
            date: new Date().toLocaleDateString('pt-BR'),
            type: form.get("type")
          }]
        };
      }
      return pet;
    });
    setPets(updatedPets);
    setShowAddHealth(false);
    e.target.reset();
  };

  const deleteHealthRecord = (recordId) => {
    const updatedPets = pets.map(pet => {
      if (pet.id === selectedPetId) {
        return {
          ...pet,
          healthRecords: pet.healthRecords.filter(r => r.id !== recordId)
        };
      }
      return pet;
    });
    setPets(updatedPets);
  };

  /* ================= EVENT ================= */
  const addEvent = (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const newEvent = {
      id: Date.now(),
      petId: selectedPetId,
      description: form.get("description"),
      date: form.get("date"),
      time: form.get("time"),
      type: form.get("type"),
      completed: false
    };
    setEvents([...events, newEvent]);
    setShowAddEvent(false);
    e.target.reset();
  };

  const toggleEventComplete = (eventId) => {
    setEvents(events.map(e => 
      e.id === eventId ? { ...e, completed: !e.completed } : e
    ));
  };

  const deleteEvent = (eventId) => {
    setEvents(events.filter(e => e.id !== eventId));
  };

  /* ================= UTILS ================= */
  const getUpcomingEvents = () => {
    const today = new Date().toISOString().split("T")[0];
    return events
      .filter(e => e.petId === selectedPetId && e.date >= today && !e.completed)
      .sort((a, b) => new Date(a.date) - new Date(b.date))
      .slice(0, 3);
  };

  const getSpeciesIcon = (species) => {
    const icons = { dog: '🐕', cat: '🐱', other: '🐾' };
    return icons[species] || '🐾';
  };

  /* ================= LOGIN SCREEN ================= */
  if (!user) {
    const [isLogin, setIsLogin] = useState(true);

    return (
      <div className="min-h-screen flex items-center justify-center p-6">
        <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md fade-in">
          <div className="text-center mb-6">
            <div className="text-6xl mb-3">🐾</div>
            <h1 className="text-3xl font-bold text-orange-500">PetVida</h1>
            <p className="text-gray-500">Cuidados Inteligentes para seu Pet</p>
          </div>

          <div className="flex mb-6 bg-gray-100 rounded-xl p-1">
            <button
              onClick={() => setIsLogin(true)}
              className={`flex-1 py-2 rounded-lg font-semibold transition-all ${isLogin ? 'bg-white shadow text-orange-500' : 'text-gray-500'}`}
            >
              Entrar
            </button>
            <button
              onClick={() => setIsLogin(false)}
              className={`flex-1 py-2 rounded-lg font-semibold transition-all ${!isLogin ? 'bg-white shadow text-orange-500' : 'text-gray-500'}`}
            >
              Criar Conta
            </button>
          </div>

          {isLogin ? (
            <form onSubmit={handleLogin} className="space-y-4">
              <Input name="email" type="email" placeholder="E-mail" required />
              <Input name="password" type="password" placeholder="Senha" required />
              <Button type="submit">Entrar</Button>
            </form>
          ) : (
            <form onSubmit={handleRegister} className="space-y-4">
              <Input name="name" placeholder="Seu nome" required />
              <Input name="email" type="email" placeholder="E-mail" required />
              <Input name="password" type="password" placeholder="Senha (mín. 6 caracteres)" required />
              <Button type="submit">Criar Conta</Button>
            </form>
          )}
        </div>
      </div>
    );
  }

  /* ================= APP ================= */
  return (
    <div className="max-w-lg mx-auto p-4 pb-24">
      {/* HEADER */}
      <header className="flex justify-between items-center mb-6 fade-in">
        <div>
          <h1 className="text-2xl font-bold text-orange-500">Olá, {user.name.split(' ')[0]}! 🐾</h1>
          <p className="text-gray-500 text-sm">{pets.length} pet(s) cadastrado(s)</p>
        </div>
        <button onClick={logout} className="text-red-500 font-bold hover:bg-red-50 p-2 rounded-lg transition-colors">
          <i className="fas fa-sign-out-alt"></i>
        </button>
      </header>

      {/* NOTIFICATIONS */}
      <Card className="mb-4 bg-gradient-to-r from-blue-500 to-blue-600 text-white">
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-3">
            <i className="fas fa-bell text-xl"></i>
            <div>
              <p className="font-bold">Notificações</p>
              <p className="text-sm opacity-80">Receba lembretes dos cuidados</p>
            </div>
          </div>
          <button onClick={enableNotifications} className="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg font-semibold transition-colors">
            Ativar
          </button>
        </div>
      </Card>

      {/* TABS */}
      <div className="flex gap-2 mb-4 overflow-x-auto">
        {[
          { id: 'pets', icon: 'fas fa-paw', label: 'Pets' },
          { id: 'events', icon: 'fas fa-calendar', label: 'Agenda' },
          { id: 'health', icon: 'fas fa-heartbeat', label: 'Saúde' }
        ].map(tab => (
          <button
            key={tab.id}
            onClick={() => setActiveTab(tab.id)}
            className={`flex items-center gap-2 px-4 py-3 rounded-xl font-semibold whitespace-nowrap transition-all ${
              activeTab === tab.id 
                ? 'bg-orange-500 text-white shadow-lg' 
                : 'bg-white text-gray-600 hover:bg-gray-100'
            }`}
          >
            <i className={tab.icon}></i>
            {tab.label}
          </button>
        ))}
      </div>

      {/* PETS TAB */}
      {activeTab === 'pets' && (
        <div className="space-y-4 fade-in">
          <div className="flex justify-between items-center">
            <h2 className="text-lg font-bold text-gray-800">Meus Pets</h2>
            <button 
              onClick={() => setShowAddPet(true)}
              className="bg-orange-500 text-white px-4 py-2 rounded-xl font-semibold hover:bg-orange-600 transition-colors"
            >
              <i className="fas fa-plus mr-2"></i>Adicionar
            </button>
          </div>

          {pets.length === 0 ? (
            <Card className="text-center py-10">
              <div className="text-6xl mb-4">🐾</div>
              <p className="text-gray-500">Nenhum pet cadastrado</p>
              <p className="text-gray-400 text-sm">Adicione seu primeiro pet!</p>
            </Card>
          ) : (
            pets.map(pet => (
              <Card 
                key={pet.id} 
                className={`pet-card cursor-pointer ${selectedPetId === pet.id ? 'ring-2 ring-orange-500' : ''}`}
                onClick={() => setSelectedPetId(pet.id)}
              >
                <div className="flex items-center gap-4">
                  <img src={pet.avatar} alt={pet.name} className="w-16 h-16 rounded-full bg-orange-100" />
                  <div className="flex-1">
                    <h3 className="font-bold text-lg text-gray-800">{getSpeciesIcon(pet.species)} {pet.name}</h3>
                    <p className="text-gray-500 text-sm">{pet.breed} • {pet.age} anos</p>
                  </div>
                  <button 
                    onClick={(e) => { e.stopPropagation(); deletePet(pet.id); }}
                    className="text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors"
                  >
                    <i className="fas fa-trash"></i>
                  </button>
                </div>
              </Card>
            ))
          )}
        </div>
      )}

      {/* EVENTS TAB */}
      {activeTab === 'events' && currentPet && (
        <div className="space-y-4 fade-in">
          <div className="flex justify-between items-center">
            <h2 className="text-lg font-bold text-gray-800">Agenda de {currentPet.name}</h2>
            <button 
              onClick={() => setShowAddEvent(true)}
              className="bg-blue-500 text-white px-4 py-2 rounded-xl font-semibold hover:bg-blue-600 transition-colors"
            >
              <i className="fas fa-plus mr-2"></i>Agendar
            </button>
          </div>

          {getUpcomingEvents().length === 0 ? (
            <Card className="text-center py-10">
              <div className="text-6xl mb-4">📅</div>
              <p className="text-gray-500">Nenhum evento próximo</p>
            </Card>
          ) : (
            getUpcomingEvents().map(event => (
              <Card key={event.id} className={event.completed ? 'opacity-60' : ''}>
                <div className="flex items-center gap-3">
                  <div className={`w-3 h-3 rounded-full ${event.type === 'vacina' ? 'bg-green-500' : 'bg-blue-500'}`}></div>
                  <div className="flex-1">
                    <p className={`font-semibold ${event.completed ? 'line-through' : ''}`}>{event.description}</p>
                    <p className="text-gray-500 text-sm">{new Date(event.date).toLocaleDateString('pt-BR')} às {event.time}</p>
                  </div>
                  <button 
                    onClick={() => toggleEventComplete(event.id)}
                    className={`p-2 rounded-lg transition-colors ${event.completed ? 'text-green-500' : 'text-gray-400 hover:text-green-500'}`}
                  >
                    <i className={`fas ${event.completed ? 'fa-check-circle' : 'fa-circle'}`}></i>
                  </button>
                  <button 
                    onClick={() => deleteEvent(event.id)}
                    className="text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors"
                  >
                    <i className="fas fa-trash"></i>
                  </button>
                </div>
              </Card>
            ))
          )}

          {!currentPet && (
            <Card className="text-center py-10 bg-yellow-50">
              <p className="text-yellow-700">Selecione um pet para ver a agenda</p>
            </Card>
          )}
        </div>
      )}

      {/* HEALTH TAB */}
      {activeTab === 'health' && currentPet && (
        <div className="space-y-4 fade-in">
          <div className="flex justify-between items-center">
            <h2 className="text-lg font-bold text-gray-800">Saúde de {currentPet.name}</h2>
            <button 
              onClick={() => setShowAddHealth(true)}
              className="bg-green-500 text-white px-4 py-2 rounded-xl font-semibold hover:bg-green-600 transition-colors"
            >
              <i className="fas fa-plus mr-2"></i>Registrar
            </button>
          </div>

          {currentPet.healthRecords.length === 0 ? (
            <Card className="text-center py-10">
              <div className="text-6xl mb-4">💉</div>
              <p className="text-gray-500">Nenhum registro de saúde</p>
            </Card>
          ) : (
            currentPet.healthRecords.map(record => (
              <Card key={record.id} className="border-l-4 border-green-500">
                <div className="flex justify-between items-start">
                  <div>
                    <p className="font-semibold text-gray-800">{record.description}</p>
                    <p className="text-gray-500 text-sm">{record.date}</p>
                  </div>
                  <button 
                    onClick={() => deleteHealthRecord(record.id)}
                    className="text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors"
                  >
                    <i className="fas fa-trash"></i>
                  </button>
                </div>
              </Card>
            ))
          )}

          {!currentPet && (
            <Card className="text-center py-10 bg-yellow-50">
              <p className="text-yellow-700">Selecione um pet para ver o histórico</p>
            </Card>
          )}
        </div>
      )}

      {/* MODALS */}
      <Modal isOpen={showAddPet} onClose={() => setShowAddPet(false)} title="Adicionar Pet">
        <form onSubmit={addPet} className="space-y-4">
          <Input name="name" label="Nome do Pet" placeholder="Ex: Rex" required />
          <Input name="breed" label="Raça" placeholder="Ex: Golden Retriever" />
          <Input name="age" label="Idade (anos)" type="number" placeholder="Ex: 3" />
          <Input name="weight" label="Peso (kg)" type="number" placeholder="Ex: 25" />
          <div>
            <label className="block text-sm font-semibold text-gray-700 mb-1">Espécie</label>
            <select name="species" className="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-orange-500 focus:outline-none">
              <option value="dog">🐕 Cachorro</option>
              <option value="cat">🐱 Gato</option>
              <option value="other">🐾 Outro</option>
            </select>
          </div>
          <div className="flex gap-3 pt-4">
            <Button variant="secondary" onClick={() => setShowAddPet(false)} className="flex-1">Cancelar</Button>
            <Button type="submit" className="flex-1">Adicionar</Button>
          </div>
        </form>
      </Modal>

      <Modal isOpen={showAddEvent} onClose={() => setShowAddEvent(false)} title="Agendar Evento">
        <form onSubmit={addEvent} className="space-y-4">
          <Input name="description" label="Descrição" placeholder="Ex: Vacina antirrábica" required />
          <Input name="date" label="Data" type="date" required />
          <Input name="time" label="Horário" type="time" required />
          <div>
            <label className="block text-sm font-semibold text-gray-700 mb-1">Tipo</label>
            <select name="type" className="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none">
              <option value="vacina">💉 Vacina</option>
              <option value="consulta">🩺 Consulta</option>
              <option value="banho">🛁 Banho</option>
              <option value="outro">📌 Outro</option>
            </select>
          </div>
          <div className="flex gap-3 pt-4">
            <Button variant="secondary" onClick={() => setShowAddEvent(false)} className="flex-1">Cancelar</Button>
            <Button type="submit" variant="info" className="flex-1">Agendar</Button>
          </div>
        </form>
      </Modal>

      <Modal isOpen={showAddHealth} onClose={() => setShowAddHealth(false)} title="Registrar Saúde">
        <form onSubmit={addHealthRecord} className="space-y-4">
          <Input name="description" label="Descrição" placeholder="Ex: Consulta de rotina" required />
          <div>
            <label className="block text-sm font-semibold text-gray-700 mb-1">Tipo</label>
            <select name="type" className="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-green-500 focus:outline-none">
              <option value="consulta">🩺 Consulta</option>
              <option value="vacina">💉 Vacina</option>
              <option value="exame">🔬 Exame</option>
              <option value="tratamento">💊 Tratamento</option>
              <option value="outro">📌 Outro</option>
            </select>
          </div>
          <div className="flex gap-3 pt-4">
            <Button variant="secondary" onClick={() => setShowAddHealth(false)} className="flex-1">Cancelar</Button>
            <Button type="submit" variant="success" className="flex-1">Registrar</Button>
          </div>
        </form>
      </Modal>

      {/* BOTTOM NAV */}
      <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-4 py-3 safe-area-pb">
        <div className="max-w-lg mx-auto flex justify-around">
          {[
            { id: 'pets', icon: 'fas fa-paw', label: 'Pets' },
            { id: 'events', icon: 'fas fa-calendar', label: 'Agenda' },
            { id: 'health', icon: 'fas fa-heartbeat', label: 'Saúde' }
          ].map(tab => (
            <button
              key={tab.id}
              onClick={() => setActiveTab(tab.id)}
              className={`flex flex-col items-center gap-1 px-4 py-2 rounded-xl transition-all ${
                activeTab === tab.id ? 'text-orange-500' : 'text-gray-400'
              }`}
            >
              <i className={`${tab.icon} text-xl`}></i>
              <span className="text-xs font-semibold">{tab.label}</span>
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
// Service Worker inline
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE_NAME = 'petvida-v1';
    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open(CACHE_NAME).then(cache => {
          return cache.addAll(['/', '/index.html']);
        })
      );
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(response => {
          return response || fetch(e.request);
        })
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl)
    .then(() => console.log("✅ Service Worker registrado"))
    .catch(err => console.log("❌ Erro SW:", err));
}
</script>
